<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masood BAI | Portfolio</title>

<style>
/* --- EXISTING STYLES (UNCHANGED) --- */

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* --- ONLY CHANGE STARTS HERE --- */

.hero-actions {
  display: grid;
  grid-template-columns: repeat(5, auto);
  gap: 16px;
  justify-content: center;
}

.hero-actions a {
  text-align: center;
}

/* center last 2 buttons */
.hero-actions a:nth-child(6) {
  grid-column: 2;
}

.hero-actions a:nth-child(7) {
  grid-column: 4;
}

/* mobile fallback (unchanged behavior) */
@media (max-width: 760px) {
  .hero-actions {
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
}

/* --- ONLY CHANGE ENDS HERE --- */
</style>
</head>

<body>

<section class="hero-banner" id="home">
  <div class="hero-inner">

    <div class="hero-copy">
      <h1>Welcome to Masood's Portfolio</h1>

      <div class="hero-actions">
        <a class="hero-btn primary" href="#about">About Me</a>
        <a class="hero-btn secondary" href="#projects">Relevant Projects</a>
        <a class="hero-btn secondary" href="#certifications">Certifications</a>
        <a class="hero-btn secondary" href="#technical-expertise">Technical Expertise</a>
        <a class="hero-btn secondary" href="#github">GitHub Repository</a>
        <a class="hero-btn secondary" href="#resume">Resume</a>
        <a class="hero-btn secondary" href="#contact">Get In Touch</a>
      </div>

    </div>

  </div>
</section>

</body>
</html>
